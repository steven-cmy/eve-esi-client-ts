name: Generate Client

on:
  schedule:
    - cron: "15 11 * * *" # Runs at 11:15 UTC daily
  workflow_dispatch:
permissions:
  contents: write
  id-token: write
jobs:
  check-update:
    name: Check ESI endpoint updates
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      esi_endpoint: ${{ steps.esi_url.outputs.esi_endpoint }}
      remote_version: ${{ steps.fetch_spec.outputs.remote_version }}
      changed: ${{ steps.check_version.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate ESI endpoint URL
        id: esi_url
        run: |
          ESI_BASE="https://esi.evetech.net/meta/openapi.json"
          TODAY_DATE=$(date -u '+%Y-%m-%d')
          FULL_URL="${ESI_BASE}?compatibility_date=${TODAY_DATE}"
          echo "esi_endpoint=$FULL_URL" >> $GITHUB_OUTPUT
      - name: Fetch version
        id: fetch_spec
        run: |
          # Fetch the OpenAPI spec and extract info.version
          REMOTE_VERSION=$(curl -s "${{ steps.esi_url.outputs.esi_endpoint }}" | jq -r '.info.version')
          echo "Remote version: $REMOTE_VERSION"
          echo "remote_version=$REMOTE_VERSION" >> $GITHUB_OUTPUT
      - name: Check version
        id: check_version
        run: |
          REMOTE_VERSION="${{ steps.fetch_spec.outputs.remote_version }}"
          if [ ! -f ESI_VERSION ]; then
            echo "No local ESI_VERSION found, creating it..."
            echo "$REMOTE_VERSION" > ESI_VERSION
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [ "$(cat ESI_VERSION)" != "$REMOTE_VERSION" ]; then
            echo "Version changed: $(cat ESI_VERSION) -> $REMOTE_VERSION"
            echo "$REMOTE_VERSION" > ESI_VERSION
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged: $REMOTE_VERSION"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  generate-client:
    name: Generate TypeScript Client
    runs-on: ubuntu-latest
    needs: check-update
    if: needs.check-update.outputs.changed == 'true'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Bump version
        id: bump
        run: |
          npm update --save
          git reset --hard
          CURRENT=$(jq -r .version package.json)
          if [[ "$CURRENT" < "1.1.0" ]]; then
            VERSION=$(npm version minor --tag-version-prefix='' --git-tag-version false)
          else
            VERSION=$(npm version patch --tag-version-prefix='' --git-tag-version false)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Generate TypeScript Client
        uses: openapi-generators/openapitools-generator-action@v1
        with:
          generator: typescript-axios
          openapi-url: "${{ needs.check-update.outputs.esi_endpoint }}"
          command-args: --minimal-update --additional-properties=supportsES6=true,npmName=eve-esi-client-ts,npmVersion=${{ steps.bump.outputs.version }},licenseName=MIT --git-user-id=${{ github.repository_owner }} --git-repo-id=${{ github.event.repository.name }} --git-host=github.com
      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          rsync -a --remove-source-files typescript-axios-client/ .
          rm -rf typescript-axios-client
          git add .
          git commit -m "Auto generate: ${{ steps.bump.outputs.version }} (ESI-${{ needs.check-update.outputs.remote_version }})"
          git push

  publish:
    name: Publish to NPM
    needs: generate-client
    uses: ./.github/workflows/publish.yml
